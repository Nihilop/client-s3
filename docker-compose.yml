services:
  minio:
    image: minio/minio:latest
    container_name: client-s3-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Create a default test bucket on startup
  minio-init:
    image: minio/mc:latest
    container_name: client-s3-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/test-bucket;
      mc mb --ignore-existing local/documents;
      mc mb --ignore-existing local/images;
      echo 'Buckets created successfully';
      "

volumes:
  minio-data:
