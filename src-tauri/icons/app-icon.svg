<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#f5a623"/>
    </linearGradient>
    <linearGradient id="bucket" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#0288d1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- Bucket body -->
  <path d="M152 200 L136 380 C134 396 148 410 164 410 L348 410 C364 410 378 396 376 380 L360 200Z"
        fill="url(#bucket)" opacity="0.9"/>

  <!-- Bucket rim (top ellipse) -->
  <ellipse cx="256" cy="200" rx="108" ry="28" fill="none" stroke="#4fc3f7" stroke-width="12" opacity="0.95"/>
  <ellipse cx="256" cy="200" rx="108" ry="28" fill="#16213e" opacity="0.3"/>

  <!-- Bucket handle left -->
  <path d="M160 170 C160 130 200 110 220 120" fill="none" stroke="#4fc3f7" stroke-width="10" stroke-linecap="round" opacity="0.7"/>

  <!-- Bucket handle right -->
  <path d="M352 170 C352 130 312 110 292 120" fill="none" stroke="#4fc3f7" stroke-width="10" stroke-linecap="round" opacity="0.7"/>

  <!-- S3 text -->
  <text x="256" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="100" fill="white" letter-spacing="-2">
    S3
  </text>

  <!-- Upload arrow -->
  <path d="M256 100 L230 135 L248 135 L248 165 L264 165 L264 135 L282 135Z"
        fill="url(#accent)" opacity="0.95"/>

  <!-- Small cloud accent -->
  <path d="M370 140 C370 120 390 108 408 116 C412 100 432 96 442 108 C458 104 470 116 466 132 C478 134 480 150 468 156 L374 156 C360 154 356 142 370 140Z"
        fill="white" opacity="0.15"/>
</svg>
